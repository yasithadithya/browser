<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyBrowser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0d14;
      --surface:   #13131f;
      --surface2:  #1a1a2e;
      --surface3:  #22223a;
      --border:    rgba(255,255,255,0.07);
      --accent:    #6366f1;
      --accent-glow: rgba(99,102,241,0.25);
      --text:      #e2e8f0;
      --muted:     #64748b;
      --secure:    #22c55e;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --shield:    #818cf8;
      --radius:    8px;
      --tab-h:     36px;
      --toolbar-h: 48px;
      --bar-h:     3px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      user-select: none;
    }

    /* ── Titlebar ─────────────────────────────────────────────────────────── */
    #titlebar {
      display: flex;
      align-items: center;
      height: 32px;
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    #titlebar .app-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex: 1;
    }
    #shield-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--shield);
      background: rgba(129,140,248,0.12);
      padding: 2px 10px;
      border-radius: 20px;
      -webkit-app-region: no-drag;
      transition: color 0.3s;
    }
    #shield-badge.active { color: var(--secure); background: rgba(34,197,94,0.12); }
    #win-controls {
      display: flex;
      gap: 6px;
      margin-left: 12px;
      -webkit-app-region: no-drag;
    }
    .win-btn {
      width: 13px; height: 13px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .win-btn:hover { opacity: 0.8; }
    #btn-close    { background: #ff5f56; }
    #btn-minimize { background: #febc2e; }
    #btn-maximize { background: #28c840; }

    /* ── Tab Bar ──────────────────────────────────────────────────────────── */
    #tab-bar {
      display: flex;
      align-items: center;
      height: var(--tab-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      gap: 4px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    #tab-bar::-webkit-scrollbar { height: 3px; }
    #tab-bar::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    .tab {
      display: flex;
      align-items: center;
      gap: 7px;
      height: 26px;
      padding: 0 10px 0 12px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      max-width: 180px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .tab:hover { background: var(--surface2); color: var(--text); }
    .tab.active {
      background: var(--surface3);
      border-color: var(--border);
      color: var(--text);
    }
    .tab .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .tab .tab-close {
      width: 16px; height: 16px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .tab .tab-close:hover { background: rgba(239,68,68,0.2); color: var(--danger); }
    .tab .tab-favicon { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }

    #new-tab-btn {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    #new-tab-btn:hover { background: var(--surface2); color: var(--text); }

    /* ── Toolbar ──────────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      height: var(--toolbar-h);
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius);
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    #url-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 34px;
      padding: 0 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #url-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    #security-icon { font-size: 13px; flex-shrink: 0; }
    #url-bar {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
    }
    #url-bar::placeholder { color: var(--muted); }
    #loading-spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    #loading-spinner.visible { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading Progress Bar ─────────────────────────────────────────────── */
    #progress-bar {
      height: var(--bar-h);
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      width: 0%;
      transition: width 0.3s ease, opacity 0.4s;
      opacity: 0;
      flex-shrink: 0;
    }
    #progress-bar.loading { opacity: 1; }

    /* ── Webview Container ────────────────────────────────────────────────── */
    #webviews {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #fff;
    }
    webview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      border: none;
    }
    webview.active { display: flex; }

    /* ── New-Tab Page ─────────────────────────────────────────────────────── */
    #newtab-page {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    #newtab-page.active { display: flex; }
    #newtab-logo {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    #newtab-search-wrap {
      display: flex;
      align-items: center;
      width: 520px;
      max-width: 90vw;
      height: 48px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 0 20px;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #newtab-search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    #newtab-search { font-size: 15px; }
    #newtab-search::placeholder { color: var(--muted); }
    #newtab-search-wrap svg { flex-shrink: 0; color: var(--muted); }
    #newtab-shortcuts {
      display: flex;
      gap: 14px;
    }
    .shortcut-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px 18px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      min-width: 80px;
      font-size: 12px;
      color: var(--muted);
    }
    .shortcut-tile:hover { background: var(--surface2); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .shortcut-tile .icon { font-size: 22px; }
    #newtab-stats {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #newtab-stats span { color: var(--shield); font-weight: 600; }
  </style>
</head>
<body>

  <!-- Titlebar -->
  <div id="titlebar">
    <div class="app-name">⚡ MyBrowser</div>
    <div id="shield-badge">🛡 <span id="blocked-count">0</span> blocked</div>
    <div id="win-controls">
      <button class="win-btn" id="btn-minimize" title="Minimize"></button>
      <button class="win-btn" id="btn-maximize" title="Maximize"></button>
      <button class="win-btn" id="btn-close"    title="Close"></button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div id="tab-bar">
    <button id="new-tab-btn" title="New Tab (Ctrl+T)">+</button>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button class="nav-btn" id="btn-back"    title="Back (Alt+Left)">&#8592;</button>
    <button class="nav-btn" id="btn-forward" title="Forward (Alt+Right)">&#8594;</button>
    <button class="nav-btn" id="btn-reload"  title="Reload (Ctrl+R)">&#8635;</button>
    <button class="nav-btn" id="btn-home"    title="Home">⌂</button>

    <div id="url-wrapper">
      <span id="security-icon">🌐</span>
      <input id="url-bar" type="text" placeholder="Search Google or enter URL  (Ctrl+L)" autocomplete="off" spellcheck="false"/>
      <div id="loading-spinner"></div>
    </div>
  </div>

  <!-- Loading bar -->
  <div id="progress-bar"></div>

  <!-- Webviews -->
  <div id="webviews">
    <div id="newtab-page">
      <div id="newtab-logo">MyBrowser</div>
      <div id="newtab-search-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="newtab-search" class="url-bar" style="flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;" type="text" placeholder="Search Google…"/>
      </div>
      <div id="newtab-shortcuts">
        <div class="shortcut-tile" data-url="https://google.com">    <span class="icon">🔍</span>Google</div>
        <div class="shortcut-tile" data-url="https://youtube.com">   <span class="icon">▶️</span>YouTube</div>
        <div class="shortcut-tile" data-url="https://github.com">    <span class="icon">🐙</span>GitHub</div>
        <div class="shortcut-tile" data-url="https://reddit.com">    <span class="icon">🤖</span>Reddit</div>
        <div class="shortcut-tile" data-url="https://wikipedia.org"> <span class="icon">📚</span>Wikipedia</div>
      </div>
      <div id="newtab-stats">🛡 <span id="newtab-count">0</span> ads &amp; trackers blocked this session</div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
